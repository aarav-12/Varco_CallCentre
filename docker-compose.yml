version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: varco_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: varco_callcentre
      POSTGRES_USER: varco_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-varco_secret_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U varco_user -d varco_callcentre"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: varco_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://varco_user:${DB_PASSWORD:-varco_secret_2024}@postgres:5432/varco_callcentre
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-jwt-secret-key}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-in-production-refresh-secret-key}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/scripts:/app/scripts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: varco_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}

volumes:
  postgres_data:
